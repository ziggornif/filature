# cargo-deny config — advisory + license + ban policy. Run: cargo deny check
# Doubles as a security sensor (RustSec advisories). See docs/security/.

[advisories]
version = 2
yanked = "deny"
# Add "RUSTSEC-YYYY-NNNN" here only with a justification recorded in
# docs/security/accepted-risks.md. Both entries below are transitive via
# rumqttc 0.25 (latest; Bambu MQTT, slice 22b) — see AR-009.
ignore = [
  # rustls-webpki 0.102.8, pulled ONLY by rumqttc (Bambu MQTT). The Bambu
  # adapter bypasses all certificate verification (AR-008), so none of these
  # cert/CRL code paths are ever exercised. The app's verifying TLS (reqwest,
  # 22a) uses rustls-webpki 0.103.13, which satisfies each advisory's fix
  # (>=0.103.12) and is unaffected. See AR-009.
  "RUSTSEC-2026-0049",  # CRLs not authoritative by distribution point
  "RUSTSEC-2026-0098",  # name constraints for URI names incorrectly accepted
  "RUSTSEC-2026-0099",  # name constraints accepted for wildcard-name certs
  "RUSTSEC-2026-0104",  # reachable panic in CRL parsing
  "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained — transitive, no PEM loaded by us
]

[licenses]
version = 2
# Permissive licenses acceptable for a self-hosted binary. Extend as real deps land.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  # Mozilla CA root-cert data bundled by rustls (webpki-root-certs, via
  # reqwest/rustls — slice 22a). Permissive data licence, standard across the
  # rustls ecosystem.
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"            # no `version = "*"` deps...
allow-wildcard-paths = true  # ...except intra-workspace path deps (domain), which are legitimately versionless

[sources]
unknown-registry = "deny"
unknown-git = "deny"
