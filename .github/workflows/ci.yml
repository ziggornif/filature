name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly advisory scan against unchanged code

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"     # build/clippy use checked-in .sqlx metadata, no live DB

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Domain purity check (hexagonal dependency rule)
        run: bash tools/check-domain-purity.sh
      - name: Slice isolation check (no slice imports a sibling slice)
        run: bash tools/check-slice-isolation.sh
      - name: Harness layout check (no docs/superpowers/ tree)
        run: |
          test ! -d docs/superpowers || {
            echo "::error::docs/superpowers/ is forbidden by the harness convention. Slice docs live in docs/specs/<NN>-<slice>.md (the agent-brief); brainstorming design and writing-plans plans are ephemeral working steps, not persisted files. Delete docs/superpowers/ and fold its content into the slice's agent-brief."
            exit 1
          }

  test-unit:
    runs-on: ubuntu-latest
    needs: [format, lint]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # domain unit tests + use-case tests via SPI stubs (stubs behind a feature)
      - run: cargo test --workspace --lib --all-features

  test-integration:
    runs-on: ubuntu-latest
    needs: [format, lint]
    # No `services:` block needed: SPI adapter tests spin up their own Postgres
    # via testcontainers (ADR-0003) against the runner's already-present Docker.
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --test 'it_*'   # integration test files: it_*.rs

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-integration]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --test 'e2e_*'  # e2e test files: e2e_*.rs

  advisory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  docker:
    # Build the runtime image and push it to this repo's GitHub Container
    # Registry (ghcr.io/ziggornif/filature). Only on pushes to main — PRs build
    # nothing here (the app still gets exercised by the test jobs).
    needs: [test-e2e, advisory]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to ghcr.io
    steps:
      - uses: actions/checkout@v5
      - name: Set up Buildx
        # docker-container driver — required for the gha cache export below
        # (the default docker driver can't export cache).
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  secrets:
    # Computational security sensor: scan the diff/history for leaked secrets
    # (the DB connection string is the one real secret). See docs/security/.
    runs-on: ubuntu-latest
    permissions:
      contents: read          # checkout
      pull-requests: write    # gitleaks-action lists PR commits + annotates on a find
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so PR scans see the whole range
      - name: gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action is free for personal accounts and public repos;
          # set GITLEAKS_LICENSE as a repo secret only if this moves under an org.
