<section id="spool-wizard" class="spool-wizard spool-wizard--condition">
  <header class="wizard-header">
    <div>
      <h1>{{ t(key="spools.new.title") }}</h1>
      <p>{{ t(key="spools.wizard.condition.prompt") }}</p>
    </div>
    <a class="button button--secondary" href="/spools">{{ t(key="common.cancel") }}</a>
  </header>
  <div class="condition-grid">
    {% for condition in ["new", "opened", "refill"] %}
      <button class="condition-card" type="button"
              hx-get="/spools/new/details?condition={{ condition }}"
              hx-target="#spool-wizard" hx-swap="outerHTML">
        <span class="condition-card__icon" aria-hidden="true">
          {% if condition == "opened" %}
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="8" stroke-dasharray="3 3.2"/><circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"/></svg>
          {% elif condition == "refill" %}
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v10M8 9l4 4 4-4"/><path d="M5 15a7 7 0 0 0 14 0"/></svg>
          {% else %}
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"/></svg>
          {% endif %}
        </span>
        <span>
          <strong>{{ t(key="spools.condition." ~ condition) }}</strong>
          <small>{{ t(key="spools.condition." ~ condition ~ ".description") }}</small>
        </span>
      </button>
    {% endfor %}
  </div>
</section>
