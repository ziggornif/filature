<!doctype html>
<html lang="{{ locale }}"{% if theme_attr %} data-theme="{{ theme_attr }}"{% endif %}>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t(key="app.name") }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous"></script>
  <!-- response-targets: lets a control route a specific non-2xx status code
       to a dedicated target element instead of htmx's default (non-2xx
       bodies are never swapped into the primary hx-target). Loaded here
       alongside htmx core so it's available everywhere, but it only takes
       effect where a template opts in via hx-ext="response-targets" (the
       locations delete control) — inert everywhere else, incl. materials. -->
  <script src="https://cdn.jsdelivr.net/npm/htmx-ext-response-targets@2.0.4" integrity="sha384-T41oglUPvXLGBVyRdZsVRxNWnOOqCynaPubjUVjxhsjFTKrFJGEMm3/0KGmNQ+Pg" crossorigin="anonymous"></script>
  <!-- colour picker sync for the spool add form; inert on pages with no .colour-field -->
  <script src="/static/colour-field.js" defer></script>
</head>
<body>
  <aside class="sidebar">
    <div class="wordmark sidebar-wordmark">{{ t(key="app.name") }}</div>
    <details class="sidebar-menu">
      <summary aria-label="{{ t(key='app.name') }} — navigation">
        <span class="wordmark">{{ t(key="app.name") }}</span>
        <span class="burger-icon" aria-hidden="true"></span>
      </summary>
      <nav>
        <a href="/"{% if page | default(value="") == "dashboard" %} class="active"{% endif %}>{{ t(key="nav.dashboard") }}</a>
        <a href="/spools"{% if page | default(value="") == "spools" %} class="active"{% endif %}>{{ t(key="nav.spools") }}</a>
        <a href="/materials"{% if page | default(value="") == "materials" %} class="active"{% endif %}>{{ t(key="nav.materials") }}</a>
        <a href="/manufacturers"{% if page | default(value="") == "manufacturers" %} class="active"{% endif %}>{{ t(key="nav.manufacturers") }}</a>
        <a href="/locations"{% if page | default(value="") == "locations" %} class="active"{% endif %}>{{ t(key="nav.locations") }}</a>
        <a href="/settings"{% if page | default(value="") == "settings" %} class="active"{% endif %}>{{ t(key="nav.settings") }}</a>
      </nav>
    </details>
    <div class="sidebar-foot">{{ t(key="shell.tagline") }}</div>
  </aside>
  <main class="content">
    {% block content %}{% endblock content %}
  </main>
</body>
</html>
