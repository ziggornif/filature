{% extends "base.html" %}
{% block content %}
  <h1>{{ t(key="spools.new.title") }}</h1>

  {% if error_key %}
    <p class="form-error">{{ t(key=error_key) }}</p>
  {% endif %}

  <form class="spool-add-form" method="post" action="/spools">
    <label>
      {{ t(key="spools.new.material") }}
      <select name="material_id" required>
        <option value="">{{ t(key="spools.new.material_placeholder") }}</option>
        {% for m in materials %}
          <option value="{{ m.id }}"{% if m.id == material_id %} selected{% endif %}>{{ m.name }}</option>
        {% endfor %}
      </select>
    </label>

    <label>
      {{ t(key="spools.new.colour_hex") }}
      <input type="text" name="colour_hex" placeholder="#RRGGBB" pattern="#[0-9A-Fa-f]{6}"
             value="{{ colour_hex }}" required>
    </label>

    <label>
      {{ t(key="spools.new.colour_name") }}
      <input type="text" name="colour_name" value="{{ colour_name }}">
    </label>

    <label>
      {{ t(key="spools.new.diameter") }}
      <select name="diameter" required>
        <option value="1.75"{% if diameter == "1.75" %} selected{% endif %}>1.75</option>
        <option value="2.85"{% if diameter == "2.85" %} selected{% endif %}>2.85</option>
      </select>
    </label>

    <label>
      {{ t(key="spools.new.net_weight") }}
      <input type="number" name="net_weight" step="0.1" min="0" value="{{ net_weight }}" required>
    </label>

    <label>
      {{ t(key="spools.new.price_paid") }}
      <input type="number" name="price_paid" step="0.01" min="0" value="{{ price_paid }}" required>
    </label>

    <button type="submit">{{ t(key="spools.new.submit") }}</button>
  </form>
{% endblock content %}
