<!doctype html>
<html lang="{{ locale }}"{% if theme_attr %} data-theme="{{ theme_attr }}"{% endif %}>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t(key="app.name") }} — {{ t(key="auth.title") }}</title>
  <!-- Self-contained by design (slice 08): the auth gate blocks /static for
       unauthenticated requests, so this page inlines its own tokens + styles
       (a subset of app.css) and pulls no external asset. System font stacks
       only — no web-font fetch. -->
  <style>
    :root {
      --sans: system-ui, "Segoe UI", sans-serif;
      --bg: #211f1c; --surface: #282521; --raised: #302d28;
      --border: #39352f; --border-strong: #4a453d;
      --text: #ece7df; --muted: #a49c8f;
      --accent: #6b7686; --accent-fg: #ffffff;
      --danger: #d6584a; --danger-bg: #3a2723;
      --shadow: 0 1px 2px rgba(0,0,0,.28), 0 1px 1px rgba(0,0,0,.2);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ece8e1; --surface: #f6f3ee; --raised: #fffefb;
        --border: #e2dcd0; --border-strong: #cec6b7;
        --text: #282520; --muted: #6d675c;
        --accent: #5b5563; --accent-fg: #ffffff;
        --danger: #b23a2e; --danger-bg: #f3e0da;
        --shadow: 0 1px 2px rgba(40,35,25,.05), 0 1px 1px rgba(40,35,25,.03);
      }
    }
    html[data-theme="light"] {
      --bg: #ece8e1; --surface: #f6f3ee; --raised: #fffefb;
      --border: #e2dcd0; --border-strong: #cec6b7;
      --text: #282520; --muted: #6d675c;
      --accent: #5b5563; --accent-fg: #ffffff;
      --danger: #b23a2e; --danger-bg: #f3e0da;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: var(--bg); color: var(--text);
      font-family: var(--sans); padding: 1.5rem;
    }
    .card {
      width: 100%; max-width: 22rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      box-shadow: var(--shadow); padding: 2rem;
    }
    .wordmark {
      font-weight: 700; font-size: 1.25rem; letter-spacing: .02em;
      margin: 0 0 .25rem;
    }
    .subtitle { color: var(--muted); font-size: .875rem; margin: 0 0 1.5rem; }
    label { display: block; font-size: .8125rem; color: var(--muted); margin: 0 0 .35rem; }
    .field { margin-bottom: 1rem; }
    input {
      width: 100%; padding: .6rem .7rem; font: inherit;
      background: var(--raised); color: var(--text);
      border: 1px solid var(--border-strong); border-radius: 8px;
    }
    input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    button {
      width: 100%; padding: .65rem; font: inherit; font-weight: 600;
      background: var(--accent); color: var(--accent-fg);
      border: 0; border-radius: 8px; cursor: pointer; margin-top: .5rem;
    }
    .error {
      background: var(--danger-bg); color: var(--danger);
      border: 1px solid var(--danger); border-radius: 8px;
      padding: .6rem .7rem; font-size: .8125rem; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="wordmark">{{ t(key="app.name") }}</h1>
    <p class="subtitle">{{ t(key="auth.subtitle") }}</p>
    {% if error %}<div class="error">{{ t(key="auth.error") }}</div>{% endif %}
    <form method="post" action="/login">
      <div class="field">
        <label for="username">{{ t(key="auth.username") }}</label>
        <input id="username" name="username" type="text" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">{{ t(key="auth.password") }}</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit">{{ t(key="auth.submit") }}</button>
    </form>
  </main>
</body>
</html>
