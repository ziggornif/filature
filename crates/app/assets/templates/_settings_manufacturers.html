<section class="settings-panel" aria-labelledby="manufacturers-title">
  <h2 id="manufacturers-title">{{ t(key="manufacturers.title") }}</h2>
  <div id="manufacturers-msg"></div>
  <div class="table-scroll referential-table-scroll">
    <table class="manufacturers-table referential-table" hx-ext="response-targets">
      <thead><tr>
        <th scope="col">{{ t(key="manufacturers.col.name") }}</th>
        <th scope="col">{{ t(key="manufacturers.col.country") }}</th>
        <th scope="col">{{ t(key="manufacturers.col.spool_count") }}</th>
        <th scope="col">{{ t(key="manufacturers.col.actions") }}</th>
      </tr></thead>
      <tbody id="manufacturers-table-body">
        {% for m in manufacturers %}{% include "_manufacturer_row.html" %}{% endfor %}
      </tbody>
    </table>
  </div>
  <form class="manufacturer-add-form" hx-post="/manufacturers"
        hx-target="#manufacturers-table-body" hx-swap="beforeend"
        hx-target-409="#manufacturers-msg" hx-ext="response-targets"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <input type="text" name="name" aria-label="{{ t(key='manufacturers.col.name') }}" placeholder="{{ t(key='manufacturers.col.name') }}" required>
    <input type="text" name="country" aria-label="{{ t(key='manufacturers.col.country') }}" placeholder="{{ t(key='manufacturers.country.placeholder') }}"
           maxlength="2" pattern="[A-Za-z]{2}">
    <button type="submit">{{ t(key="manufacturers.add") }}</button>
  </form>
</section>
