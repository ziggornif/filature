<section class="settings-panel" aria-labelledby="locations-title">
  <h2 id="locations-title">{{ t(key="locations.title") }}</h2>
  <div id="locations-msg" class="form-error" role="alert" aria-live="polite"></div>
  <div class="table-scroll referential-table-scroll">
    <table class="locations-table referential-table" hx-ext="response-targets">
      <thead><tr>
        <th scope="col">{{ t(key="locations.col.name") }}</th>
        <th scope="col">{{ t(key="locations.col.note") }}</th>
        <th scope="col">{{ t(key="locations.col.spool_count") }}</th>
        <th scope="col">{{ t(key="locations.col.actions") }}</th>
      </tr></thead>
      <tbody id="locations-table-body">
        {% for l in locations %}{% include "_location_row.html" %}{% endfor %}
      </tbody>
    </table>
  </div>
  <form class="location-add-form" hx-ext="response-targets" hx-post="/locations"
        hx-target="#locations-table-body" hx-swap="beforeend"
        hx-target-error="#locations-msg"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <input type="text" name="name" aria-label="{{ t(key='locations.col.name') }}" placeholder="{{ t(key='locations.col.name') }}" required>
    <input type="text" name="note" aria-label="{{ t(key='locations.col.note') }}" placeholder="{{ t(key='locations.note') }}">
    <button type="submit">{{ t(key="locations.add") }}</button>
  </form>
</section>
